/system identity set name=R01.LBN
/user set admin password=123

/interface bridge add name=loopback0
/ip address add address=1.1.1.5/32 interface=loopback0
/ip address add address=10.0.6.2/30 interface=ether2
/ip address add address=10.0.7.1/30 interface=ether3
/ip address add address=10.0.4.2/30 interface=ether4

/routing ospf instance set default router-id=1.1.1.5
/routing ospf area add name=backbone area-id=0.0.0.0
/routing ospf network add network=10.0.4.0/30 area=backbone
/routing ospf network add network=10.0.6.0/30 area=backbone
/routing ospf network add network=10.0.7.0/30 area=backbone
/routing ospf network add network=1.1.1.5/32 area=backbone

/mpls ldp set enabled=yes transport-address=1.1.1.5
/mpls ldp interface add interface=ether2
/mpls ldp interface add interface=ether3
/mpls ldp interface add interface=ether4

