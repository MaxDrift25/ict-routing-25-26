/system identity set name=R01.HKI
/user set admin password=123

Part 0:

/interface bridge add name=loopback0
/ip address add address=1.1.1.3/32 interface=loopback0
/ip address add address=10.0.2.2/30 interface=ether2
/ip address add address=10.0.4.1/30 interface=ether3
/ip address add address=10.0.5.1/30 interface=ether4

/routing ospf instance set default router-id=1.1.1.3 disabled=no
/routing ospf area add name=backbone area-id=0.0.0.0
/routing ospf network add network=10.0.2.0/30 area=backbone
/routing ospf network add network=10.0.4.0/30 area=backbone
/routing ospf network add network=10.0.5.0/30 area=backbone
/routing ospf network add network=1.1.1.3/32 area=backbone

/mpls ldp set enabled=yes transport-address=1.1.1.3
/mpls ldp interface add interface=ether2
/mpls ldp interface add interface=ether3
/mpls ldp interface add interface=ether4

/routing bgp instance set default as=65000 router-id=1.1.1.3
/routing bgp instance enable default
/routing bgp peer add name=to-NY remote-address=1.1.1.1 remote-as=65000 update-source=loopback0 address-families=ip route-reflect=yes
/routing bgp peer add name=to-SPB remote-address=1.1.1.4 remote-as=65000 update-source=loopback0 address-families=ip route-reflect=yes
/routing bgp peer add name=to-SVL remote-address=1.1.1.6 remote-as=65000 update-source=loopback0 address-families=ip route-reflect=yes
/routing bgp peer add name=to-LND remote-address=1.1.1.2 remote-as=65000 update-source=loopback0 address-families=ip
/routing bgp peer add name=to-LBN remote-address=1.1.1.5 remote-as=65000 update-source=loopback0 address-families=ip

Part 1:

/routing bgp peer set to-NY address-families=ip,vpnv4
/routing bgp peer set to-SPB address-families=ip,vpnv4
/routing bgp peer set to-SVL address-families=ip,vpnv4
/routing bgp peer set to-LND address-families=ip,vpnv4
/routing bgp peer set to-LBN address-families=ip,vpnv4
