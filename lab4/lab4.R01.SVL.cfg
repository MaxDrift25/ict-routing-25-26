/system identity set name=R01.SVL
/user set admin password=123


Part 0:

/interface bridge add name=loopback0
/ip address add address=1.1.1.6/32 interface=loopback0
/ip address add address=10.0.6.2/30 interface=ether2

/routing ospf instance set default router-id=1.1.1.6 disabled=no
/routing ospf area add name=backbone area-id=0.0.0.0
/routing ospf network add network=10.0.6.0/30 area=backbone
/routing ospf network add network=1.1.1.6/32 area=backbone

/mpls ldp set enabled=yes transport-address=1.1.1.6
/mpls ldp interface add interface=ether2

/routing bgp instance set default as=65000 router-id=1.1.1.6
/routing bgp instance enable default
/routing bgp peer add name=to-LND remote-address=1.1.1.2 remote-as=65000 update-source=loopback0 address-families=ip
/routing bgp peer add name=to-HKI remote-address=1.1.1.3 remote-as=65000 update-source=loopback0 address-families=ip
/routing bgp peer add name=to-LBN remote-address=1.1.1.5 remote-as=65000 update-source=loopback0 address-families=ip



Part 1:

/interface bridge add name=bridge_DEVOPS
/interface bridge port add bridge=bridge_DEVOPS interface=ether4
/ip address add address=192.168.3.1/24 interface=bridge_DEVOPS network=192.168.3.0
/ip route vrf add interfaces=bridge_DEVOPS route-distinguisher=100:3 \
   export-route-targets=100:100 import-route-targets=100:100 routing-mark=DEVOPS
/routing bgp vpn add vrf=DEVOPS redistribute=connected \
   route-distinguisher=100:3 \
   import-route-targets=100:100 \
   export-route-targets=100:100 \
   label-allocation-policy=per-vrf
   
/routing bgp peer set to-LND address-families=ip,vpnv4
/routing bgp peer set to-HKI address-families=ip,vpnv4
/routing bgp peer set to-LBN address-families=ip,vpnv4


Part 2:

/routing bgp vpn remove [find vrf=DEVOPS]
/ip route vrf remove [find routing-mark=DEVOPS]
/ip address remove [find interface=bridge_DEVOPS]
/interface bridge port remove [find interface=ether4]
/interface bridge remove bridge_DEVOPS
/routing bgp peer set to-LND address-families=ip
/routing bgp peer set to-HKI address-families=ip
/routing bgp peer set to-LBN address-families=ip

/interface vpls add name=vpls-SVL-NY remote-peer=1.1.1.1 cisco-style=yes cisco-style-id=100 disabled=no
/interface vpls add name=vpls-SVL-SPB remote-peer=1.1.1.4 cisco-style=yes cisco-style-id=100 disabled=no
/interface bridge add name=bridge_VPLS
/interface bridge port add bridge=bridge_VPLS interface=ether4
/interface bridge port add bridge=bridge_VPLS interface=vpls-SVL-NY
/interface bridge port add bridge=bridge_VPLS interface=vpls-SVL-SPB
