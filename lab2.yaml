name: lab2
mgmt:
  network: mgmt
  ipv4-subnet: 172.16.100.0/24
topology:
  nodes:
    R01.MSK:
      kind: mikrotik_ros
      image: vrnetlab/mikrotik_routeros:6.47.9
      mgmt-ipv4: 172.16.100.10
      startup-config: ./lab2.R01.MSK.cfg
    R01.FRT:
      kind: mikrotik_ros
      image: vrnetlab/mikrotik_routeros:6.47.9
      mgmt-ipv4: 172.16.100.11
      startup-config: ./lab2.R01.FRT.cfg
    R01.BRL:
      kind: mikrotik_ros
      image: vrnetlab/mikrotik_routeros:6.47.9
      mgmt-ipv4: 172.16.100.12
      startup-config: ./lab2.R01.BRL.cfg
    PC1:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.16.100.13
      exec:
        - ip link set eth1 up
        - udhcpc -i eth1 -n -q
        - ip route del default
        - ip route del default
        - ip route add default via 192.168.1.1 dev eth1
        - echo "PC1" > /etc/hostname
        - hostname -F /etc/hostname
    PC2:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.16.100.14
      exec:
        - ip link set eth1 up
        - udhcpc -i eth1 -n -q
        - ip route del default
        - ip route del default
        - ip route add default via 192.168.2.1 dev eth1
        - echo "PC2" > /etc/hostname
        - hostname -F /etc/hostname
    PC3:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.16.100.15
      exec:
        - ip link set eth1 up
        - udhcpc -i eth1 -n -q
        - ip route del default
        - ip route del default
        - ip route add default via 192.168.3.1 dev eth1
        - echo "PC3" > /etc/hostname
        - hostname -F /etc/hostname
        
    CORP-SW:
      kind: bridge
  links:
    - endpoints: ["R01.MSK:ether2", "CORP-SW:eth1"]
    - endpoints: ["R01.FRT:ether2", "CORP-SW:eth2"]
    - endpoints: ["R01.BRL:ether2", "CORP-SW:eth3"]
    - endpoints: ["R01.MSK:ether3", "PC1:eth1"]
    - endpoints: ["R01.FRT:ether3", "PC2:eth1"]
    - endpoints: ["R01.BRL:ether3", "PC3:eth1"]
