/system identity set name=SW02-2
/user set admin password=123

/interface bridge add name=bridge1
/interface bridge port add bridge=bridge1 interface=ether2
/interface bridge port add bridge=bridge1 interface=ether3
/interface bridge set bridge1 vlan-filtering=yes

/interface bridge vlan add bridge=bridge1 vlan-ids=20 tagged=bridge1,ether2 untagged=ether3
/interface bridge port set [find interface=ether3] pvid=20

