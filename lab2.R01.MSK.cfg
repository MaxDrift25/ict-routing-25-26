/system identity set name=R01.MSK
/user set admin password=123

/ip address add address=10.0.0.1/24 interface=ether2
/ip address add address=192.168.1.1/24 interface=ether3

/ip pool add name=pool_msk ranges=192.168.1.100-192.168.1.200
/ip dhcp-server add name=dhcp_msk interface=ether3 address-pool=pool_msk
/ip dhcp-server network add address=192.168.1.0/24 gateway=192.168.1.1
/ip dhcp-server enable dhcp_msk

/ip settings set ip-forward=yes

/ip route add dst-address=192.168.2.0/24 gateway=10.0.0.2
/ip route add dst-address=192.168.3.0/24 gateway=10.0.0.3
