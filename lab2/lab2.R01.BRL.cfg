/system identity set name=R01.BRL
/user set admin password=123

/ip address add address=10.0.0.3/24 interface=ether2
/ip address add address=192.168.3.1/24 interface=ether3

/ip pool add name=pool_brl ranges=192.168.3.100-192.168.3.200
/ip dhcp-server add name=dhcp_brl interface=ether3 address-pool=pool_brl
/ip dhcp-server network add address=192.168.3.0/24 gateway=192.168.3.1
/ip dhcp-server enable dhcp_brl

/ip settings set ip-forward=yes

/ip route add dst-address=192.168.1.0/24 gateway=10.0.0.1
/ip route add dst-address=192.168.2.0/24 gateway=10.0.0.2
