/system identity set name=R01.NY
/user set admin password=123

/interface bridge add name=loopback0
/ip address add address=1.1.1.1/32 interface=loopback0
/ip address add address=10.0.2.2/30 interface=ether2
/ip address add address=10.0.7.2/30 interface=ether3

/routing ospf instance set default router-id=1.1.1.1
/routing ospf area add name=backbone area-id=0.0.0.0
/routing ospf network add network=10.0.2.0/30 area=backbone
/routing ospf network add network=10.0.7.0/30 area=backbone
/routing ospf network add network=1.1.1.1/32 area=backbone

/mpls ldp set enabled=yes transport-address=1.1.1.1
/mpls ldp interface add interface=ether2
/mpls ldp interface add interface=ether3

/interface vpls add name=vpls-ny-spb remote-peer=1.1.1.4 cisco-style=yes cisco-style-id=100 disabled=no
/interface bridge add name=bridge_client
/interface bridge port add bridge=bridge_client interface=ether4
/interface bridge port add bridge=bridge_client interface=vpls-ny-spb

